<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="TrackScore Suite – kies je spel en hou scores bij." />
  <meta name="theme-color" content="#0B1220" />
  <title>TrackScore Suite</title>

  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="./img/icoon-192.png">
  <link rel="apple-touch-icon" href="./img/icoon-192.png">
  <meta name="theme-color" content="#0B1220">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="TrackScore">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
  --bg0:#070B14;
  --bg1:#0B1220;
  --text:#EAF0FF;
  --muted:#A9B4D0;
  --muted2:#7E8AA8;
  --module-radius:22px;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Manrope,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  color:var(--text);
  background:
    radial-gradient(1200px 600px at 50% -10%, rgba(34,211,238,.18), transparent 60%),
    radial-gradient(900px 500px at 90% 15%, rgba(34,197,94,.14), transparent 55%),
    radial-gradient(700px 420px at 10% 20%, rgba(28,78,216,.16), transparent 55%),
    linear-gradient(180deg,var(--bg0),var(--bg1));
}

.container{
  width:100%;
  max-width:960px;
  margin:auto;
  padding:12px;
}

.brandbar{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-bottom:8px;
}

.brandiconImg{
  width:34px;
  height:34px;
  border-radius:10px;
}

.brandlogoImg{
  height:28px;
}

.installRow{
  display:flex;
  justify-content:flex-end;
  margin-bottom:12px;
}

#installBtn{
  display:none;
  align-items:center;
  gap:8px;
  padding:10px 12px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.06);
  color:white;
  cursor:pointer;
}

.sectionLabel{
  margin-bottom:10px;
  color:var(--muted2);
  font-size:12px;
  letter-spacing:.12em;
  text-transform:uppercase;
}

/* GRID */

.moduleGrid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
}

.moduleLink{
  display:block;
}

.moduleImage{
  width:100%;
  border-radius:var(--module-radius);
  filter:
    drop-shadow(0 14px 28px rgba(0,0,0,.42))
    drop-shadow(0 8px 18px rgba(0,0,0,.24));
}

/* MOBILE */

@media (max-width:760px){

  .moduleGrid{
    grid-template-columns:1fr;
    gap:0;
  }

  .moduleImage{
    width:96%;
    margin:auto;
  }

  .moduleLink--soccer{
    margin-bottom:-60px;
  }

  .moduleLink--darts{
    margin-top:-60px;
  }

}

</style>
</head>

<body>

<div class="container">

<div class="brandbar">
<img class="brandiconImg" src="./img/icoon.png">
<img class="brandlogoImg" src="./img/logo.png">
</div>

<div class="installRow">
<button id="installBtn">Installeren</button>
</div>

<div class="sectionLabel">Score registratie</div>

<div class="moduleGrid">

<a class="moduleLink moduleLink--soccer" href="./games/trackscore.html">
<img class="moduleImage" src="./img/soccerscore.png">
</a>

<a class="moduleLink moduleLink--darts" href="./games/dartscore.html">
<img class="moduleImage" src="./img/dartscore.png">
</a>

</div>

</div>

<script>

const installBtn=document.getElementById("installBtn");
let deferredPrompt=null;

function isIOS(){
  return /iphone|ipad|ipod/i.test(navigator.userAgent);
}

function isAndroid(){
  return /android/i.test(navigator.userAgent);
}

function isStandalone(){
  return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;
}

function showInstallButton(){
  if(!isStandalone()){
    installBtn.style.display="inline-flex";
  }
}

window.addEventListener("beforeinstallprompt",(e)=>{
  e.preventDefault();
  deferredPrompt=e;
  showInstallButton();
});

installBtn.onclick=async()=>{

  if(deferredPrompt){
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt=null;
    return;
  }

  if(isIOS()){
    alert("Tik in Safari op Deel en kies ‘Zet op beginscherm’.");
    return;
  }

  if(isAndroid()){
    alert("Open het Chrome-menu en kies ‘App installeren’ of ‘Toevoegen aan startscherm’.");
    return;
  }

};

window.addEventListener("appinstalled",()=>{
  installBtn.style.display="none";
  deferredPrompt=null;
});

window.addEventListener("load",()=>{
  if(!isStandalone() && (isIOS() || isAndroid())){
    showInstallButton();
  }
});

if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("./sw.js");
  });
}

</script>

</body>
</html>
